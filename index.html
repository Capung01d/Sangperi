<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sang_peri PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; background: #000; }
        #splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeOut 1s ease 2.5s forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(110vh) translateX(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ec4899;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #customAlert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3000;
        }
        #customAlert.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="bg-slate-900">

    <div id="splash">
        <div class="text-center">
            <h1 class="text-5xl font-bold text-white mb-2 drop-shadow-lg">Sang_peri</h1>
            <p class="text-white/80 tracking-widest uppercase text-sm">Professional Edition</p>
        </div>
    </div>

    <div id="customAlert" class="glass px-6 py-3 rounded-full text-white font-medium shadow-2xl">
        <span id="alertMsg"></span>
    </div>

    <div id="loadingOverlay">
        <div class="spinner mb-4"></div>
        <p class="text-lg font-medium animate-pulse">Menghubungkan ke Server...</p>
    </div>

    <div id="loginView" class="h-screen w-full flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center">
        <div class="absolute inset-0 bg-pink-900/20 backdrop-blur-sm"></div>
        <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-sm relative fade-in">
            <div class="w-20 h-20 bg-pink-500 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-pink-500/50">
                <span class="text-4xl">🌸</span>
            </div>
            <h2 class="text-2xl font-bold text-white text-center mb-1">Selamat Datang</h2>
            <p class="text-white/70 text-center mb-8 text-sm">Silahkan masukkan akses anda</p>
            
            <div class="space-y-4">
                <input id="passInput" type="password" placeholder="Password PIN" 
                    class="w-full bg-white/10 border border-white/20 p-4 rounded-2xl text-white text-center placeholder:text-white/40 focus:outline-none focus:ring-2 focus:ring-pink-400 transition-all">
                
                <button onclick="handleLogin()" 
                    class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-pink-500/30 active:scale-95 transition-all">
                    Akses Sekarang
                </button>
            </div>
            <p id="errorHint" class="text-red-300 text-xs mt-4 text-center opacity-0 transition-opacity">PIN yang anda masukkan tidak terdaftar.</p>
        </div>
    </div>

    <div id="dashboardView" class="hidden h-screen w-full flex items-center justify-center bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 overflow-hidden">
        <div class="glass p-10 rounded-3xl shadow-2xl w-full max-w-md text-center relative fade-in">
            <div class="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-24 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center border border-white/30">
                <span class="text-5xl animate-bounce">✨</span>
            </div>
            
            <h2 id="greetingMsg" class="text-3xl font-bold text-white mt-4 mb-2"></h2>
            <p class="text-white/70 mb-8 leading-relaxed">System Sang_peri PRO telah aktif dan siap digunakan. Silahkan klik tombol di bawah untuk memulai sesi.</p>
            
            <button onclick="launchSession()" 
                class="group relative w-full bg-white text-indigo-900 font-bold py-4 rounded-2xl overflow-hidden shadow-xl active:scale-95 transition-all">
                <span class="relative z-10">Mulai Eksploitasi</span>
                <div class="absolute inset-0 bg-gradient-to-r from-pink-300 to-indigo-200 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
            </button>
        </div>
    </div>

    <!-- Improved Audio Handling -->
    <audio id="sfxSuccess" preload="auto">
        <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Particle generation
        for (let i = 0; i < 40; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "%";
            p.style.top = Math.random() * 100 + "%";
            p.style.animationDuration = (Math.random() * 10 + 10) + "s";
            p.style.animationDelay = (Math.random() * 5) + "s";
            document.body.appendChild(p);
        }

        function showAlert(text) {
            const el = document.getElementById('customAlert');
            document.getElementById('alertMsg').innerText = text;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        async function playSuccessSound() {
            const audio = document.getElementById("sfxSuccess");
            try {
                // Reset and play
                audio.currentTime = 0;
                await audio.play();
            } catch (err) {
                console.warn("Audio playback failed or was blocked:", err);
            }
        }

        function handleLogin() {
            const pass = document.getElementById("passInput").value;
            const hint = document.getElementById("errorHint");

            if (pass === "kiply123") {
                playSuccessSound();
                showAlert("Akses Berhasil Diterima ✅");
                
                setTimeout(() => {
                    document.getElementById("loginView").classList.add("hidden");
                    document.getElementById("dashboardView").classList.remove("hidden");
                    setGreeting();
                }, 800);
            } else {
                hint.classList.remove("opacity-0");
                document.getElementById("passInput").classList.add("border-red-500");
                setTimeout(() => {
                    hint.classList.add("opacity-0");
                    document.getElementById("passInput").classList.remove("border-red-500");
                }, 2000);
            }
        }

        function setGreeting() {
            const hour = new Date().getHours();
            let greet = "";
            if (hour < 11) greet = "Selamat Pagi 🌅";
            else if (hour < 15) greet = "Selamat Siang ☀️";
            else if (hour < 19) greet = "Selamat Sore 🌆";
            else greet = "Selamat Malam 🌙";
            
            document.getElementById("greetingMsg").innerText = greet;
        }

        function launchSession() {
            document.getElementById("loadingOverlay").style.display = "flex";
            setTimeout(() => {
                window.location.href = "https://zefoy.online/";
            }, 2500);
        }

        document.getElementById("passInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleLogin();
        });
    </script>
</body>
</html>
