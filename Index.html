<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sang_peri.Tiktok Views</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --primary: #ec4899; --secondary: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; background: #0f172a; color: white; touch-action: manipulation; }
        .flower-pattern { background-image: radial-gradient(#ec4899 0.5px, transparent 0.5px); background-size: 25px 25px; opacity: 0.2; }
        .leaf-pattern { background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 2c5 10 10 15 10 20s-5 10-10 10-10-5-10-10 5-10 10-20z' fill='%233b82f6' fill-opacity='0.15'/%3E%3C/svg%3E"); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px) saturate(160%); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .bg-dash { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 0; width: 100%; height: 100%; pointer-events: none; }
        .active-view { position: relative; z-index: 10; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        input { background: rgba(255, 255, 255, 0.08) !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; color: white !important; -webkit-appearance: none; }
        .btn-tap { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        .btn-tap:active { transform: scale(0.92); filter: brightness(0.8); }
        .hidden-screen { display: none !important; opacity: 0; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="login-screen" class="active-view flower-pattern">
        <div class="glass p-8 md:p-12 w-full max-w-md text-center">
            <div class="mb-6 inline-flex p-4 rounded-3xl bg-pink-500/20 text-pink-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <h1 class="text-4xl font-extrabold mb-1 tracking-tighter">Sang_peri</h1>
            <p class="text-pink-400 font-bold text-xs uppercase tracking-[0.3em] mb-8">Tiktok Views</p>
            <div class="space-y-4">
                <input type="number" id="pass-input" pattern="\d*" inputmode="numeric" placeholder="Nomor Akses" class="w-full px-6 py-4 rounded-2xl text-center text-xl font-bold outline-none focus:ring-2 focus:ring-pink-500">
                <button onclick="validateLogin()" class="btn-tap w-full py-4 bg-pink-600 hover:bg-pink-700 rounded-2xl font-black text-lg shadow-lg shadow-pink-500/30">LOGIN</button>
            </div>
            <p id="error-box" class="text-red-400 mt-6 font-bold text-xs leading-relaxed hidden bg-red-900/20 p-4 rounded-xl border border-red-500/20">
                pasword salah goblok coba tanya sama mazkiply Dev
            </p>
        </div>
    </div>
    <div id="dash-screen" class="active-view bg-dash leaf-pattern hidden-screen">
        <div class="glass bg-white/40 border-white/60 p-8 md:p-12 w-full max-w-2xl text-center text-slate-800">
            <div class="mb-6">
                <span class="px-4 py-1 bg-blue-600 text-white rounded-full font-bold text-[10px] tracking-widest uppercase">Sang_peri Premium</span>
            </div>
            <div id="greeting-container" class="mb-8 min-h-[100px] flex items-center justify-center">
                <p id="greeting-label" class="text-2xl md:text-3xl font-extrabold text-blue-900 italic leading-tight"></p>
            </div>
            <div class="bg-blue-500/10 p-6 rounded-3xl mb-8 border border-blue-500/20">
                <p class="text-lg font-bold text-blue-700 uppercase tracking-tight">ayo kita tambahkan Views tiktok</p>
            </div>
            <button onclick="startApp()" class="btn-tap w-full md:w-auto px-12 py-5 bg-blue-600 hover:bg-blue-700 rounded-3xl text-white font-black text-xl shadow-2xl flex items-center justify-center gap-3 mx-auto">
                MULAI SEKARANG
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
            </button>
        </div>
    </div>
    <div id="success-screen" class="fixed inset-0 z-[100] bg-blue-600 flex flex-col items-center justify-center hidden-screen">
        <div class="w-20 h-20 border-6 border-white border-t-transparent rounded-full animate-spin mb-6"></div>
        <h3 class="text-3xl font-black text-white italic px-6 text-center">Selamat apk anda telah berhasil</h3>
    </div>
    <script>
        let scene, camera, renderer, points;
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 1;
            camera.rotation.x = Math.PI/2;
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<5000; i++) {
                pos.push(Math.random()*600-300, Math.random()*600-300, Math.random()*600-300);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0xec4899, size: 1.2, transparent: true, opacity: 0.8 });
            points = new THREE.Points(geo, mat);
            scene.add(points);
            loop();
        }
        function loop() {
            const positions = points.geometry.attributes.position.array;
            for(let i=1; i<positions.length; i+=3) {
                positions[i] -= 1.5;
                if(positions[i] < -300) positions[i] = 300;
            }
            points.geometry.attributes.position.needsUpdate = true;
            points.rotation.y += 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }
        function validateLogin() {
            const val = document.getElementById('pass-input').value;
            const err = document.getElementById('error-box');
            const scs = document.getElementById('success-screen');
            if(val === "21142") {
                err.classList.add('hidden');
                scs.classList.remove('hidden-screen');
                gsap.fromTo(scs, { opacity: 0 }, { opacity: 1, duration: 0.3, onComplete: () => {
                    setTimeout(() => {
                        gsap.to(scs, { opacity: 0, duration: 0.3, onComplete: () => {
                            scs.classList.add('hidden-screen');
                            showDashboard();
                        }});
                    }, 2000);
                }});
            } else {
                err.classList.remove('hidden');
                gsap.fromTo("#login-screen .glass", { x: -10 }, { x: 10, duration: 0.05, repeat: 5, yoyo: true });
            }
        }
        function showDashboard() {
            gsap.to("#login-screen", { opacity: 0, scale: 0.9, duration: 0.5, onComplete: () => {
                document.getElementById('login-screen').classList.add('hidden-screen');
                const d = document.getElementById('dash-screen');
                d.classList.remove('hidden-screen');
                gsap.fromTo(d, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6 });
                points.material.color.setHex(0x3b82f6);
                runGreetings();
            }});
        }
        const words = [
            "Selamat datang di aplikasi Sang peri.",
            "Tingkatkan eksistensi TikTok Anda.",
            "Layanan terbaik dari Sang peri.",
            "Keajaiban dalam satu sentuhan.",
            "Terima kasih telah menggunakan Sang peri."
        ];
        function runGreetings() {
            const label = document.getElementById('greeting-label');
            let idx = 0;
            const next = () => {
                gsap.to(label, { opacity: 0, y: 5, duration: 0.4, onComplete: () => {
                    label.innerText = words[idx];
                    idx = (idx + 1) % words.length;
                    gsap.to(label, { opacity: 1, y: 0, duration: 0.4 });
                }});
            };
            next();
            setInterval(next, 4500);
        }
        function startApp() {
            gsap.to("body", { opacity: 0, duration: 0.4, onComplete: () => {
                window.location.href = "https://zefoy.online/";
            }});
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        window.onload = init;
    </script>
</body>
</html>
